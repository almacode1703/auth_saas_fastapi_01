<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body style="margin:0; padding:0; background-color:#0f0f1a; font-family:'Inter', sans-serif;">
  
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#0f0f1a; padding: 40px 0;">
    <tr>
      <td align="center">
        
        <!-- Main card -->
        <table width="480" cellpadding="0" cellspacing="0" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 48px 40px;">
          <tr>
            <td align="center" style="padding-bottom: 32px;">
              <!-- Logo / App name -->
              <h1 style="margin:0; font-size:24px; font-weight:700; color:#ffffff; letter-spacing:2px;">AUTH-SAAS</h1>
              <p style="margin:8px 0 0; font-size:13px; color:rgba(255,255,255,0.4); letter-spacing:1px;">SECURE AUTHENTICATION</p>
            </td>
          </tr>

          <tr>
            <td align="center" style="padding-bottom: 24px;">
              <!-- Divider -->
              <hr style="border:none; border-top: 1px solid rgba(255,255,255,0.08); width:100%;">
            </td>
          </tr>

          <tr>
            <td align="center" style="padding-bottom: 16px;">
              <p style="margin:0; font-size:15px; color:rgba(255,255,255,0.6); line-height:1.6;">
                Use the code below to verify your email address.
              </p>
            </td>
          </tr>

          <tr>
            <td align="center" style="padding: 24px 0;">
              <!-- OTP box -->
              <div style="background: rgba(79,142,247,0.15); border: 1px solid rgba(79,142,247,0.4); border-radius: 12px; padding: 24px 48px; display:inline-block;">
                <h1 style="margin:0; font-size:48px; font-weight:700; color:#4f8ef7; letter-spacing:16px; font-family:'Inter', monospace;">
                  {{otp}}
                </h1>
              </div>
            </td>
          </tr>

          <tr>
            <td align="center" style="padding-bottom: 32px;">
              <p style="margin:0; font-size:13px; color:rgba(255,255,255,0.4);">
                This code expires in <span style="color:#4f8ef7; font-weight:600;">10 minutes</span>
              </p>
            </td>
          </tr>

          <tr>
            <td align="center" style="padding-bottom: 24px;">
              <hr style="border:none; border-top: 1px solid rgba(255,255,255,0.08); width:100%;">
            </td>
          </tr>

          <tr>
            <td align="center">
              <p style="margin:0; font-size:12px; color:rgba(255,255,255,0.25); line-height:1.6;">
                If you did not request this, please ignore this email.<br>
                Your account will remain secure.
              </p>
            </td>
          </tr>

        </table>
        <!-- End main card -->

        <p style="margin-top:24px; font-size:12px; color:rgba(255,255,255,0.2);">
          &copy; 2026 Auth-Saas. All rights reserved.
        </p>

      </td>
    </tr>
  </table>

</body>
</html>

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: authsaasdb
    ports:
      - "5432:5432"
    volumes:
      - authsaas_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - db
    restart: on-failure

  rag-service:
    build: ./rag-service
    ports:
      - "8001:8001"
    env_file:
      - ./rag-service/.env
    volumes:
      - rag_data:/app/data
      - rag_vector_db:/app/vector_db
    restart: on-failure

volumes:
  authsaas_data:
  rag_data:
  rag_vector_db: